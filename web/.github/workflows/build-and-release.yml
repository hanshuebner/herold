name: build-and-release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm build

      - name: Stamp version metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > apps/suite/dist/VERSION

      - name: Package suite dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: tar -C apps/suite/dist -czf tabard-suite-dist.tar.gz .

      - name: Publish rolling latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          notes="Rolling build of \`main\` @ ${short_sha} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Replace the rolling tag so the asset URL stays stable.
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin refs/tags/latest

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --target "${GITHUB_SHA}" \
              --title "latest (${short_sha})" \
              --notes "${notes}" \
              --prerelease=false
            # Wipe old assets so clients always pull the freshest tarball.
            gh release view latest --json assets --jq '.assets[].name' \
              | xargs -I {} gh release delete-asset latest {} --yes || true
          else
            gh release create latest \
              --target "${GITHUB_SHA}" \
              --title "latest (${short_sha})" \
              --notes "${notes}"
          fi

          gh release upload latest tabard-suite-dist.tar.gz --clobber
