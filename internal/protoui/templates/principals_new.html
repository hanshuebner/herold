{{define "principals_new_body"}}
{{$body := .Body}}
<section class="card">
  <h2>New principal</h2>
  <form method="post" action="{{.PathBase}}/principals" class="stack">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <label>
      <span>Email</span>
      <input type="email" name="email" required value="{{index $body "Email"}}">
    </label>
    <label>
      <span>Display name</span>
      <input type="text" name="display_name" value="{{index $body "DisplayName"}}">
    </label>
    <label>
      <span>Initial password</span>
      <input type="password" name="password" required minlength="12">
      <small>Minimum 12 characters.</small>
    </label>
    <button type="submit" class="primary">Create principal</button>
  </form>
</section>
{{end}}
