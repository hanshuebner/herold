# James WebAdmin API configuration for interop tests.
# Minimal setup: enable WebAdmin on 0.0.0.0:8000, no TLS, no JWT.
# The jwt.publickeypem.url line must NOT be present (even empty) or James
# tries to resolve it and crashes with a directory-is-a-file error.
enabled=true
port=8000
host=0.0.0.0
cors.enable=true
