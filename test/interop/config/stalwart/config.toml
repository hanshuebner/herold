# Stalwart mail server configuration for the interop test suite.
# Minimal configuration for Stalwart v0.10.6.
#
# Known limitation: Stalwart v0.10.6 attempts to write its merged
# "local config" back to the config file path at startup.  If the
# file is mounted :ro the write fails with a Read-only file system
# error, but the error is non-fatal and Stalwart continues to start.
# The compose stack mounts a writable copy via the stalwart_etc
# volume; see docker-compose.yml for the init container that seeds it.

[server]
hostname = "mail.stalwart.test"

[server.listener.smtp]
bind = ["0.0.0.0:25"]
protocol = "smtp"

[server.listener.submission]
bind = ["0.0.0.0:587"]
protocol = "smtp"

[server.listener.imap]
bind = ["0.0.0.0:143"]
protocol = "imap"

[server.listener.imaps]
bind = ["0.0.0.0:993"]
protocol = "imap"
tls.implicit = true

[server.listener.management]
bind = ["0.0.0.0:8080"]
protocol = "http"

[server.tls]
certificate = "default"
ignore-client-errors = true

[certificate.default]
cert = "%{file:/etc/stalwart/tls/stalwart.crt}%"
private-key = "%{file:/etc/stalwart/tls/stalwart.key}%"

[store.rocksdb]
type = "rocksdb"
path = "/opt/stalwart-mail/data"

[storage]
data = "rocksdb"
fts = "rocksdb"
blob = "rocksdb"
lookup = "rocksdb"
directory = "internal"

[directory.internal]
type = "internal"
store = "rocksdb"

[authentication.fallback-admin]
user = "admin"
secret = "adminpw-stalwart"

[session.ehlo]
reject-non-fqdn = false

[session.rcpt]
# Allow relay unconditionally: the interop network is isolated.
# Stalwart 0.10.x accepts "true" as a bare boolean expression for the
# relay setting (bypasses the if/else array).
relay = "true"
errors = { total = 5, wait = "1ms" }

[tracer.stdout]
type = "stdout"
level = "info"
enable = true
