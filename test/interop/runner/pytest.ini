[pytest]
# strict-markers: any marker not declared here is an error.
addopts = --strict-markers
markers =
    inbound: tests verifying herold receives mail from an external MTA
    outbound: tests verifying herold delivers mail to an external MTA
    imap_client: text-mode IMAP client interop scenarios (task #3)
    bulk: load / bulk-send scenarios; NOT collected by default (task #4)
    imaptest: Dovecot imaptest IMAP wire-protocol conformance; requires imaptest compose profile; NOT collected by default
