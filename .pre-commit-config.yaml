# Pre-commit hooks. Install in one shot with:
#   make install-hooks
# (which runs scripts/install-hooks.sh; that wraps `pre-commit install` for
# both pre-commit and pre-push stages).
#
# The Go-specific hooks use local wrappers so the versions match what CI uses
# (they read $(go env GOPATH)/bin). Keep this file and .github/workflows/ci.yml
# aligned — a contributor running pre-commit locally should see the same
# failures that CI would report. CI enforces this parity by running
# `pre-commit run --all-files` in its own job.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      # Mailparse spike fixtures are byte-precise: they intentionally
      # exercise edge cases like a trailing-LF zero-length body
      # (16-zero-length-body.eml) and CRLF-only headers
      # (22-mixed-line-endings.eml). The whitespace/EOL hooks must not
      # rewrite them or the parser tests change meaning.
      - id: end-of-file-fixer
        exclude: ^internal/mailparse/testdata/
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^internal/mailparse/testdata/
      - id: trailing-whitespace
        exclude: ^internal/mailparse/testdata/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -d
        language: system
        types: [go]
        pass_filenames: true
      - id: goimports
        name: goimports
        # Block scalar (|-) so the inner `install: go install` text does not
        # collide with YAML's plain-scalar rule against ": ". Strips the
        # trailing newline so pre-commit sees a single-line command.
        entry: |-
          bash -c 'command -v goimports >/dev/null 2>&1 || { echo "install: go install golang.org/x/tools/cmd/goimports@latest" >&2; exit 1; }; goimports -l -d -local github.com/hanshuebner/herold "$@"' --
        language: system
        types: [go]
        pass_filenames: true
      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./... || exit 1' --
        language: system
        types: [go]
        pass_filenames: false
      - id: go-mod-tidy
        name: go mod tidy (check)
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum' --
        language: system
        pass_filenames: false
        files: (^go\.mod$|^go\.sum$|\.go$)
      - id: staticcheck
        name: staticcheck
        # See goimports above re: |- block scalar.
        entry: |-
          bash -c 'command -v staticcheck >/dev/null 2>&1 || { echo "install: go install honnef.co/go/tools/cmd/staticcheck@latest" >&2; exit 1; }; staticcheck ./...' --
        language: system
        types: [go]
        pass_filenames: false
      # Schema-version invariant: CurrentSchemaVersion must equal the max
      # migration number on both backends, with identical migration sets.
      # Mirrors internal/diag/backup.TestCurrentSchemaVersionMatchesMaxMigration
      # but runs in <1s without compiling Go. Triggered when manifest.go or
      # any *.sql migration changes.
      - id: schema-version
        name: schema version vs max migration
        entry: scripts/check-schema-version.sh
        language: system
        pass_filenames: false
        files: |
          (?x)^(
            internal/diag/backup/manifest\.go
          | internal/storesqlite/migrations/.*\.sql
          | internal/storepg/migrations/.*\.sql
          )$

      # pre-push stage: fast invariant tests that catch the bug class
      # (schema version + migrate round-trip) which has been the most
      # common cause of green-locally-red-on-main failures. ~10s on a
      # warm cache. Install with `make install-hooks` (which passes
      # --hook-type pre-push to pre-commit install).
      - id: diag-fast-tests
        name: go test ./internal/diag/backup ./internal/diag/migrate
        entry: bash -c 'go test -count=1 -short ./internal/diag/backup/... ./internal/diag/migrate/...' --
        language: system
        pass_filenames: false
        stages: [pre-push]

default_language_version:
  python: python3
