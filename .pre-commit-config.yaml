# Pre-commit hooks. Install in one shot with:
#   make install-hooks
# (which runs scripts/install-hooks.sh; that wraps `pre-commit install` for
# both pre-commit and pre-push stages).
#
# The Go-specific hooks use local wrappers so the versions match what CI uses
# (they read $(go env GOPATH)/bin). Keep this file and .github/workflows/ci.yml
# aligned — a contributor running pre-commit locally should see the same
# failures that CI would report. CI enforces this parity by running
# `pre-commit run --all-files` in its own job.

# Run hooks only at the stage they were declared for. Without this,
# `default_stages` is "all stages", so every hook below runs at both the
# pre-commit and pre-push hook-types — meaning gofmt/goimports/vet/
# staticcheck etc. fire twice for every push (once when the commit was
# created, once before the push). Pinning to [pre-commit] makes the
# default explicit; the diag-fast-tests hook below opts into [pre-push]
# explicitly so it still runs as the pre-push gate.
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Several upstream hooks declare stages: [pre-commit, pre-push,
      # manual] in their own .pre-commit-hooks.yaml, which overrides
      # our top-level `default_stages`. Pin them to [pre-commit] here
      # so the pre-push gate doesn't redundantly re-run them.
      - id: check-added-large-files
        args: [--maxkb=512]
        stages: [pre-commit]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      # Mailparse spike fixtures are byte-precise: they intentionally
      # exercise edge cases like a trailing-LF zero-length body
      # (16-zero-length-body.eml) and CRLF-only headers
      # (22-mixed-line-endings.eml). The whitespace/EOL hooks must not
      # rewrite them or the parser tests change meaning.
      - id: end-of-file-fixer
        exclude: ^internal/mailparse/testdata/
        stages: [pre-commit]
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^internal/mailparse/testdata/
      - id: trailing-whitespace
        exclude: ^internal/mailparse/testdata/
        stages: [pre-commit]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        # gofmt -l -d prints diagnostics but ALWAYS exits 0, so a naive
        # `entry: gofmt -l -d` lets dirty files through the hook. CI runs
        # the right shape (capture -l output, fail when non-empty); mirror
        # that here so local pre-commit and CI agree. Block scalar (|-)
        # so the inline bash one-liner survives YAML quoting.
        entry: |-
          bash -c 'out=$(gofmt -l "$@"); if [ -n "$out" ]; then printf "gofmt needs to be run on:\n%s\n" "$out"; gofmt -d "$@"; exit 1; fi' --
        language: system
        types: [go]
        pass_filenames: true
      - id: goimports
        name: goimports
        # Same exit-code trap as gofmt: goimports -l -d emits findings
        # but exits 0. Capture -l output and fail on non-empty so dirty
        # imports cannot pass the hook.
        entry: |-
          bash -c 'command -v goimports >/dev/null 2>&1 || { echo "install: go install golang.org/x/tools/cmd/goimports@latest" >&2; exit 1; }; out=$(goimports -l -local github.com/hanshuebner/herold "$@"); if [ -n "$out" ]; then printf "goimports needs to be run on:\n%s\n" "$out"; goimports -d -local github.com/hanshuebner/herold "$@"; exit 1; fi' --
        language: system
        types: [go]
        pass_filenames: true
      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./... || exit 1' --
        language: system
        types: [go]
        pass_filenames: false
      - id: go-mod-tidy
        name: go mod tidy (check)
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum' --
        language: system
        pass_filenames: false
        files: (^go\.mod$|^go\.sum$|\.go$)
      - id: staticcheck
        name: staticcheck
        # See goimports above re: |- block scalar.
        entry: |-
          bash -c 'command -v staticcheck >/dev/null 2>&1 || { echo "install: go install honnef.co/go/tools/cmd/staticcheck@latest" >&2; exit 1; }; staticcheck ./...' --
        language: system
        types: [go]
        pass_filenames: false
      # Schema-version invariant: CurrentSchemaVersion must equal the max
      # migration number on both backends, with identical migration sets.
      # Mirrors internal/diag/backup.TestCurrentSchemaVersionMatchesMaxMigration
      # but runs in <1s without compiling Go. Triggered when manifest.go or
      # any *.sql migration changes.
      - id: schema-version
        name: schema version vs max migration
        entry: scripts/check-schema-version.sh
        language: system
        pass_filenames: false
        files: |
          (?x)^(
            internal/diag/backup/manifest\.go
          | internal/storesqlite/migrations/.*\.sql
          | internal/storepg/migrations/.*\.sql
          )$

      # Fast invariant tests that catch the bug class (schema version
      # + migrate round-trip) which has been the most common cause of
      # green-locally-red-on-main failures. ~10s on a warm cache.
      # Originally lived at pre-push so commits stayed snappy, but
      # `git push` had two reasons to run any hooks at all (this row
      # plus three upstream lint hooks that ignored default_stages),
      # so it was confusing in practice. Pinned to pre-commit now;
      # `git push` runs no hooks.
      - id: diag-fast-tests
        name: go test ./internal/diag/backup ./internal/diag/migrate
        entry: bash -c 'go test -count=1 -short ./internal/diag/backup/... ./internal/diag/migrate/...' --
        language: system
        pass_filenames: false

default_language_version:
  python: python3
