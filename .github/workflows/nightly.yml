name: nightly

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  # No explicit cache-path env block. We do not use actions/cache on this
  # runner because the data already lives on its disk between jobs; the
  # upload/download to GitHub's cache service is pure overhead. Go defaults
  # (~/.cache/go-build, ~/go/pkg/mod) live under the persistent runner
  # user's $HOME, so they reuse state across jobs without any extra
  # wiring. See ci.yml for the same rationale.

jobs:
  fuzz-long:
    name: fuzz (long)
    runs-on: self-hosted
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      - name: run long fuzz on every registered fuzz target
        run: make fuzz-short FUZZTIME=45m

  load:
    name: load (REQ-NFR-01 targets)
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      # Scenarios live under test/load/. Phase 0 ships the workflow; Phase 1
      # and 2 each add scenarios per docs/design/server/implementation/03-testing-strategy.md.
      - name: run load scenarios
        run: |
          if [ -d test/load ]; then go test -count=1 -timeout=2h ./test/load/...; else
            echo "test/load not yet populated"; fi

  interop:
    name: interop (third-party deliverability canary)
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      # Real-world deliverability canaries against Gmail / Outlook / iCloud /
      # Yahoo / Fastmail / Zoho / ProtonMail. Requires a staging environment
      # with throwaway domains and DNS control; wiring lands in Phase 2.5.
      - name: run interop canary
        run: |
          if [ -d test/interop-external ]; then go test -count=1 ./test/interop-external/...; else
            echo "test/interop-external not yet populated"; fi

  jmaptest-pin-check:
    name: jmaptest pin freshness
    runs-on: self-hosted
    timeout-minutes: 5
    # Fails when the JMAPTEST_SHA pin in test/interop/config/jmaptest/Dockerfile
    # is no longer the upstream master HEAD of jmapio/jmap-test-suite.
    # Treats divergence as a signal to bump the pin (and re-run the suite)
    # so we pick up new conformance tests as upstream lands them.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: compare pinned SHA against upstream master
        run: |
          set -euo pipefail
          DOCKERFILE=test/interop/config/jmaptest/Dockerfile
          PINNED=$(grep -E '^ARG JMAPTEST_SHA=' "${DOCKERFILE}" \
                   | head -1 \
                   | sed -E 's/^ARG JMAPTEST_SHA=([0-9a-f]+).*/\1/')
          if [ -z "${PINNED}" ]; then
            echo "ERROR: could not parse JMAPTEST_SHA from ${DOCKERFILE}"
            exit 2
          fi
          UPSTREAM=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/jmapio/jmap-test-suite/commits/master \
              | sed -nE 's/^[[:space:]]*"sha":[[:space:]]*"([0-9a-f]+)".*/\1/p' \
              | head -1)
          if [ -z "${UPSTREAM}" ]; then
            echo "ERROR: could not fetch upstream master SHA"
            exit 2
          fi
          echo "pinned SHA:   ${PINNED}"
          echo "upstream SHA: ${UPSTREAM}"
          if [ "${PINNED}" != "${UPSTREAM}" ]; then
            echo ""
            echo "FAIL: jmap-test-suite pin is stale."
            echo "Update JMAPTEST_SHA in ${DOCKERFILE} to ${UPSTREAM}"
            echo "and re-run the suite (make interop-jmaptest) to pick up"
            echo "any new conformance tests."
            exit 1
          fi
          echo "OK: pin matches upstream master."

  sbom-diff:
    name: sbom diff
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      - name: generate SBOM
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.17.8
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: upload
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom
          path: sbom.cdx.json
