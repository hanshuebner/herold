name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Aligned with go.mod's `go 1.25.0` directive. Several direct deps
  # (golang.org/x/sync v0.20.0, golang.org/x/crypto v0.49.0,
  # golang.org/x/oauth2 v0.36.0, github.com/coreos/go-oidc/v3 v3.18.0,
  # github.com/jackc/pgx/v5 v5.9.2, the otel/otlptrace exporters, etc.)
  # already require Go 1.25 at module level, so the CI floor must match.
  # Per STANDARDS §2 the floor moves with the current stable; the Phase 1
  # planning floor of 1.23 was lifted at Phase 1.5 kickoff to track this.
  GO_VERSION: "1.25.x"
  # Node + pnpm versions for the web/ workspace. Floor-tracked: pnpm 10
  # is the lockfile generator on disk and the workspace package.json
  # `engines` block requires pnpm >= 9. Node 20 LTS is the floor; vite 6
  # supports Node 18+, but 20 is what package.json declares.
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  # No explicit cache-path env block. We do not use actions/cache on this
  # runner because the data already lives on its disk between jobs; the
  # upload/download to GitHub's cache service is pure overhead. The Go and
  # pnpm tools default to paths under the persistent runner user's $HOME
  # (~/.cache/go-build, ~/go/pkg/mod, ~/.local/share/pnpm/store/v10), so
  # they reuse state across jobs without any extra wiring.

jobs:
  # pre-commit job runs the full .pre-commit-config.yaml chain across all
  # files. Its purpose is to keep .pre-commit-config.yaml and the rest of
  # the CI in lockstep: any check available locally is also enforced here,
  # so contributors who run `make install-hooks` see exactly what CI sees.
  # Adds tracked guards (e.g. scripts/check-schema-version.sh) before the
  # heavier go-test matrix runs.
  pre-commit:
    name: pre-commit (run --all-files)
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      - name: install Go tools used by pre-commit hooks
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # The svelte-check pre-commit hook runs `pnpm --dir web run check`,
      # so the pre-commit job needs Node + pnpm on PATH and the workspace
      # dependencies installed. Without this the hook fails with
      # "pnpm: command not found" (CI 25148811931).
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Persistent self-hosted runner: pnpm store pinned via
          # npm_config_store_dir at workflow level; actions/cache adds
          # only upload/download overhead here.
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: prep web placeholders
        run: make prep-web
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  lint:
    name: lint
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      # go vet / staticcheck / govulncheck must compile the tree, which
      # means internal/webspa/embed_default.go's `//go:embed dist` has to
      # resolve. prep-web copies the tracked placeholders into
      # internal/webspa/dist/ when the directory is empty (clean checkout
      # path). Mirrors the same step in the test job.
      - name: prep web placeholders
        run: make prep-web
      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "gofmt needs to be run on:"; echo "$diff"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@fe1dd0c3658873b46f8c9bb3291096a617310ca6 # v1.3.1
        with:
          version: latest
          install-go: false
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...

  web:
    name: web (build + check)
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Persistent self-hosted runner: pnpm store pinned via
          # npm_config_store_dir at workflow level; actions/cache adds
          # only upload/download overhead here.
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: build (suite SPA)
        run: pnpm --dir web run build
      - name: check (svelte-check etc)
        run: pnpm --dir web run check
      # `test` and `lint` are no-ops today (no package defines them);
      # `pnpm --recursive --if-present` keeps that future-proof.
      - name: test
        run: pnpm --dir web run test
      - name: lint
        run: pnpm --dir web run lint

  web-e2e:
    name: web-e2e (admin SPA Playwright)
    runs-on: self-hosted
    timeout-minutes: 15
    needs: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Persistent self-hosted runner: pnpm store pinned via
          # npm_config_store_dir at workflow level; actions/cache adds
          # only upload/download overhead here.
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: install Playwright browsers (chromium only)
        run: pnpm --filter @herold/admin test:e2e:install
      - name: run admin e2e tests (chromium)
        run: pnpm --filter @herold/admin test:e2e

  test:
    name: test (arm64 / ${{ matrix.store }})
    runs-on: [self-hosted, arm64]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        store: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: herold
          POSTGRES_PASSWORD: herold
          POSTGRES_DB: herold
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HEROLD_TEST_STORE: ${{ matrix.store }}
      # HEROLD_PG_DSN is set per-step on the postgres lane only -- exporting
      # it on the sqlite lane caused test/e2e and storepg/diag-migrate to
      # also exercise the postgres path against the leg's service container,
      # duplicating coverage and (with cross-package parallelism) letting
      # those packages step on each other's truncations.
      HEROLD_PG_DSN_VALUE: postgres://herold:herold@localhost:5432/herold?sslmode=disable
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      # Tests run native on arm64 (ubuntu-24.04-arm). The amd64 leg was
      # dropped because the shared self-hosted amd64 runner consistently
      # exceeded the per-job timeout on `go test -race ./...`; arm64 native
      # is faster and the production deploy targets are arm64.
      # Build with the default tag (which embeds the SPA placeholders
      # via go:embed) and then a second pass with -tags nofrontend so
      # the build-tag split (internal/webspa/embed_default.go vs
      # embed_stub.go) cannot regress without CI catching it.
      #
      # prep-web populates internal/webspa/dist/{admin,suite}/index.html
      # from the tracked placeholders so //go:embed dist resolves on a
      # clean checkout where `make build-web` has not run.
      - name: prep web placeholders
        run: make prep-web
      - name: build (embedded)
        run: go build -trimpath ./...
      - name: build (nofrontend)
        run: go build -trimpath -tags nofrontend ./...
      - name: wait for postgres
        if: matrix.store == 'postgres'
        run: |
          # Poll until the service container is ready to accept
          # connections. The service options block already runs
          # pg_isready inside the container; this guard ensures the
          # host-side test process does not race the bring-up.
          # ubuntu-24.04-arm does not preinstall postgresql-client, so
          # use a portable TCP probe (bash /dev/tcp) instead of
          # pg_isready -- avoids the apt-get install round-trip.
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/localhost/5432) 2>/dev/null; then
              exec 3>&-
              echo "postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgres not ready after 30s" >&2
          exit 1
      - name: test (sqlite lane)
        if: matrix.store == 'sqlite'
        # HEROLD_PG_DSN intentionally unset so test/e2e and storepg /
        # diag-migrate skip the postgres legs. Sqlite tests use per-package
        # temp dirs so default cross-package parallelism is safe.
        # -timeout 20m: the default 10m is per test binary, and a few of
        # the heavier packages (protoadmin ~8m, protoimap ~5m, protojmap
        # ~3m) sit close to the limit under -race; allow headroom rather
        # than chase per-test parallelism right now.
        run: go test -race -count=1 -timeout 20m ./...
      - name: test (postgres lane, pg-touching packages serialised)
        if: matrix.store == 'postgres'
        env:
          HEROLD_PG_DSN: ${{ env.HEROLD_PG_DSN_VALUE }}
        # Run packages that open the shared postgres service one at a time
        # (-p 1) so storepg compliance, internal/diag/migrate, and test/e2e
        # do not truncate each other's rows (surfaced as "AUTHENTICATIONFAILED
        # LOGIN failed", "conflict: already linked", etc.).
        # -race intentionally dropped on the postgres lane: the sqlite
        # lane runs the entire tree under the race detector already, and
        # this lane's purpose is real-database integration coverage, not
        # a second pass of race coverage. Skipping -race halves the
        # postgres-lane wall clock without losing race-detector reach.
        run: go test -count=1 -timeout 20m -p 1 ./internal/storepg/... ./internal/diag/migrate/... ./test/e2e/...
      - name: test (postgres lane, rest in parallel)
        if: matrix.store == 'postgres'
        # HEROLD_PG_DSN unset for this step: pg-touching packages above
        # are excluded here, and the rest must not silently start hitting
        # postgres.
        # -timeout 20m: same rationale as the sqlite lane -- the postgres
        # lane is incidentally heavier (storesqlite + protoadmin run
        # concurrently in this batch), and protoadmin tipped past 10m on
        # ci run 25361758519.
        # -race dropped here too; see the rationale on the serialised
        # step above. Race coverage is the sqlite lane's job.
        run: |
          PKGS=$(go list ./... | grep -vE '^github.com/hanshuebner/herold/(internal/storepg|internal/diag/migrate|test/e2e)($|/)')
          go test -count=1 -timeout 20m $PKGS

  fuzz-short:
    name: fuzz (short)
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      - name: run short fuzz on every fuzz target touched in this PR
        # 32 fuzz targets must finish inside the 15-minute job timeout.
        # 5s/target leaves headroom for per-target Go-compile overhead.
        run: make fuzz-short FUZZTIME=5s

  conformance:
    name: conformance (imaptest + scripted-smtp + pigeonhole + mail-auth vectors)
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # Persistent self-hosted runner: GOMODCACHE / GOCACHE pinned at
          # workflow level survive job runs naturally, no actions/cache needed.
          cache: false
      # The Go conformance package under test/interop/scripted runs an
      # in-process scripted SMTP corpus and Dovecot's imaptest when its
      # binary is on PATH. The Python/Docker interop tree is exercised
      # by the nightly interop job (separate workflow); this lane keeps
      # the per-PR feedback loop fast.
      - name: run conformance
        run: go test -count=1 ./test/interop/...

  docker:
    name: docker (build + publish to ghcr)
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [lint, web, test]
    # On PRs we only build (no registry credentials, no push). On pushes
    # to main and on git tags we additionally push to ghcr.io so users
    # can `docker pull ghcr.io/${{ github.repository }}:latest` (or a
    # tagged version) without having to clone and build the source.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # No setup-qemu-action: this job builds only linux/arm64 natively
      # on the arm64 self-hosted runner; cross-arch emulation is not used.
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive image tags
        id: tags
        run: |
          # Lower-case the image owner because OCI registries reject
          # uppercase repository segments and github.repository preserves
          # the case the user typed.
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}"
          tags=""
          # Always tag with the short commit SHA so PR builds are
          # uniquely addressable in the local cache even when nothing
          # is pushed.
          tags="${image}:sha-${GITHUB_SHA::12}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${image}:main,${image}:latest"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/}"
            tags="${tags},${image}:${ver},${image}:latest"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
      - name: build (and push when not a PR)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          # Build only linux/arm64 here. The self-hosted CI runner is
          # arm64, so amd64 would require QEMU emulation -- which breaks
          # esbuild (vite's bundler) inside the multi-stage Dockerfile
          # with `runtime: lfstack.push invalid packing` (Go's amd64
          # pointer-packing assumption is incompatible with QEMU on the
          # arm64 host; ci run 25364986444 / job 74382336044). Multi-arch
          # release images are produced by release.yml on tag pushes;
          # this job exists for the per-commit `:main` / `:latest` /
          # `:sha-...` tags and arm64 alone covers the deploy target.
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          # Local on-disk buildx cache. The runner is a single persistent
          # host, so `type=local` reuses the layer cache across runs without
          # the GHA cache-service round-trip that `type=gha` requires. Path
          # is under the runner user's $HOME (`hans` on the configured
          # self-hosted box).
          cache-from: type=local,src=/home/hans/.cache/docker-buildx
          cache-to: type=local,dest=/home/hans/.cache/docker-buildx,mode=max
          provenance: false

  jmaptest:
    name: jmap conformance (jmapio/jmap-test-suite)
    runs-on: self-hosted
    timeout-minutes: 25
    # First clean run on the self-hosted runner (ci run 25373519283 /
    # job 74448831697) reported total=309 passed=304 failed=0 skipped=5
    # required_failed=0 recommended_failed=0. The 5 skipped are
    # cross-account Blob/copy + Email/copy (a feature herold has not
    # implemented; the upstream suite skips when the server's session
    # document does not advertise the relevant capability), and the
    # historic deferred items called out in the previous comment
    # (REQ-STORE-36..39, REQ-PROTO-48) no longer surface as Required
    # failures. The suite CLI exits 0 on its own, so drop the
    # continue-on-error gate; a future Required regression now breaks
    # CI for real.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: run jmaptest harness
        run: make interop-jmaptest
      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: jmaptest-logs
          path: test/interop/logs/
          if-no-files-found: warn
          retention-days: 14
