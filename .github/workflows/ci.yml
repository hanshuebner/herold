name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Aligned with go.mod's `go 1.25.0` directive. Several direct deps
  # (golang.org/x/sync v0.20.0, golang.org/x/crypto v0.49.0,
  # golang.org/x/oauth2 v0.36.0, github.com/coreos/go-oidc/v3 v3.18.0,
  # github.com/jackc/pgx/v5 v5.9.2, the otel/otlptrace exporters, etc.)
  # already require Go 1.25 at module level, so the CI floor must match.
  # Per STANDARDS §2 the floor moves with the current stable; the Phase 1
  # planning floor of 1.23 was lifted at Phase 1.5 kickoff to track this.
  GO_VERSION: "1.25.x"
  # Node + pnpm versions for the web/ workspace. Floor-tracked: pnpm 10
  # is the lockfile generator on disk and the workspace package.json
  # `engines` block requires pnpm >= 9. Node 20 LTS is the floor; vite 6
  # supports Node 18+, but 20 is what package.json declares.
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # pre-commit job runs the full .pre-commit-config.yaml chain across all
  # files. Its purpose is to keep .pre-commit-config.yaml and the rest of
  # the CI in lockstep: any check available locally is also enforced here,
  # so contributors who run `make install-hooks` see exactly what CI sees.
  # Adds tracked guards (e.g. scripts/check-schema-version.sh) before the
  # heavier go-test matrix runs.
  pre-commit:
    name: pre-commit (run --all-files)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install Go tools used by pre-commit hooks
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # The svelte-check pre-commit hook runs `pnpm --dir web run check`,
      # so the pre-commit job needs Node + pnpm on PATH and the workspace
      # dependencies installed. Without this the hook fails with
      # "pnpm: command not found" (CI 25148811931).
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: prep web placeholders
        run: make prep-web
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # go vet / staticcheck / govulncheck must compile the tree, which
      # means internal/webspa/embed_default.go's `//go:embed dist` has to
      # resolve. prep-web copies the tracked placeholders into
      # internal/webspa/dist/ when the directory is empty (clean checkout
      # path). Mirrors the same step in the test job.
      - name: prep web placeholders
        run: make prep-web
      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "gofmt needs to be run on:"; echo "$diff"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@fe1dd0c3658873b46f8c9bb3291096a617310ca6 # v1.3.1
        with:
          version: latest
          install-go: false
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...

  web:
    name: web (build + check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: build (suite SPA)
        run: pnpm --dir web run build
      - name: check (svelte-check etc)
        run: pnpm --dir web run check
      # `test` and `lint` are no-ops today (no package defines them);
      # `pnpm --recursive --if-present` keeps that future-proof.
      - name: test
        run: pnpm --dir web run test
      - name: lint
        run: pnpm --dir web run lint

  web-e2e:
    name: web-e2e (admin SPA Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: install Playwright browsers (chromium only)
        run: pnpm --filter @herold/admin test:e2e:install
      - name: run admin e2e tests (chromium)
        run: pnpm --filter @herold/admin test:e2e

  test:
    name: test (arm64 / ${{ matrix.store }})
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        store: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: herold
          POSTGRES_PASSWORD: herold
          POSTGRES_DB: herold
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HEROLD_TEST_STORE: ${{ matrix.store }}
      # HEROLD_PG_DSN is read by internal/storepg/storepg_test.go and the
      # test/e2e fixtures. Aligning on this single name keeps the
      # Postgres parity legs (storepg compliance + cross-backend e2e)
      # actually exercised in CI per STANDARDS §1.8 / §8.4.
      HEROLD_PG_DSN: postgres://herold:herold@localhost:5432/herold?sslmode=disable
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Tests run native on arm64 (ubuntu-24.04-arm). The amd64 leg was
      # dropped because the shared ubuntu-latest amd64 runner consistently
      # exceeded the per-job timeout on `go test -race ./...`; arm64 native
      # is faster and the production deploy targets are arm64.
      # Build with the default tag (which embeds the SPA placeholders
      # via go:embed) and then a second pass with -tags nofrontend so
      # the build-tag split (internal/webspa/embed_default.go vs
      # embed_stub.go) cannot regress without CI catching it.
      #
      # prep-web populates internal/webspa/dist/{admin,suite}/index.html
      # from the tracked placeholders so //go:embed dist resolves on a
      # clean checkout where `make build-web` has not run.
      - name: prep web placeholders
        run: make prep-web
      - name: build (embedded)
        run: go build -trimpath ./...
      - name: build (nofrontend)
        run: go build -trimpath -tags nofrontend ./...
      - name: wait for postgres
        if: matrix.store == 'postgres'
        run: |
          # Poll until the service container is ready to accept
          # connections. The service options block already runs
          # pg_isready inside the container; this guard ensures the
          # host-side test process does not race the bring-up.
          # ubuntu-24.04-arm does not preinstall postgresql-client, so
          # use a portable TCP probe (bash /dev/tcp) instead of
          # pg_isready -- avoids the apt-get install round-trip.
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/localhost/5432) 2>/dev/null; then
              exec 3>&-
              echo "postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgres not ready after 30s" >&2
          exit 1
      - name: test
        # Serialize package execution on the postgres lane: every test
        # package that touches postgres shares the same database, so
        # cross-package parallelism (the default) lets storepg compliance
        # tests and test/e2e fixtures step on each other (e.g. truncating
        # a principal another package just inserted, then failing IMAP
        # LOGIN). The sqlite lane uses per-package temp dirs and is safe
        # to run in parallel.
        run: |
          if [ "${{ matrix.store }}" = "postgres" ]; then
            go test -race -count=1 -p 1 ./...
          else
            go test -race -count=1 ./...
          fi

  fuzz-short:
    name: fuzz (short)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: run short fuzz on every fuzz target touched in this PR
        # 32 fuzz targets must finish inside the 15-minute job timeout.
        # 5s/target leaves headroom for per-target Go-compile overhead.
        run: make fuzz-short FUZZTIME=5s

  conformance:
    name: conformance (imaptest + scripted-smtp + pigeonhole + mail-auth vectors)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Wiring for these suites is conformance-fuzz-engineer's surface.
      # Phase 0 lands the workflow; the test/interop tree is currently a
      # Python/Docker harness with no Go packages, so `go test ./test/interop/...`
      # exits with "no packages to test" (1). Treat the missing-Go-package
      # state as pass; once Phase 1 wires in imaptest / Postfix-Exim /
      # Pigeonhole / mail-auth vectors, drop the guard and let `go test`
      # run the suite directly.
      - name: run conformance
        run: |
          if find test/interop -name '*.go' | head -1 | grep -q .; then
            go test -count=1 ./test/interop/...
          else
            echo "test/interop has no Go packages yet (Phase 0 placeholder); skipping."
          fi

  docker:
    name: docker (build + publish to ghcr)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, web, test]
    # On PRs we only build (no registry credentials, no push). On pushes
    # to main and on git tags we additionally push to ghcr.io so users
    # can `docker pull ghcr.io/${{ github.repository }}:latest` (or a
    # tagged version) without having to clone and build the source.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive image tags
        id: tags
        run: |
          # Lower-case the image owner because OCI registries reject
          # uppercase repository segments and github.repository preserves
          # the case the user typed.
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}"
          tags=""
          # Always tag with the short commit SHA so PR builds are
          # uniquely addressable in the local cache even when nothing
          # is pushed.
          tags="${image}:sha-${GITHUB_SHA::12}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${image}:main,${image}:latest"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/}"
            tags="${tags},${image}:${ver},${image}:latest"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
      - name: build (and push when not a PR)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          # Multi-arch build matches the binary release surface in
          # release.yml. amd64 builds native; arm64 goes through QEMU.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          # GHA cache cuts the SPA + Go build from ~5min to seconds on
          # incremental runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  jmaptest:
    name: jmap conformance (jmapio/jmap-test-suite)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Advisory only for now. The suite has 5 Required failures tracked under
    # REQ-STORE-36..39 (multi-mailbox membership) and REQ-PROTO-48 (Web Push
    # VAPID dispatcher); failing the build on those would block every PR
    # until those items land. Surface the result for visibility without
    # gating. Drop continue-on-error once the deferred items close out.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: run jmaptest harness
        run: make interop-jmaptest
      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: jmaptest-logs
          path: test/interop/logs/
          if-no-files-found: warn
          retention-days: 14
