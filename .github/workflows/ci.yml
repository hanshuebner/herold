name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Aligned with go.mod's `go 1.25.0` directive. Several direct deps
  # (golang.org/x/sync v0.20.0, golang.org/x/crypto v0.49.0,
  # golang.org/x/oauth2 v0.36.0, github.com/coreos/go-oidc/v3 v3.18.0,
  # github.com/jackc/pgx/v5 v5.9.2, the otel/otlptrace exporters, etc.)
  # already require Go 1.25 at module level, so the CI floor must match.
  # Per STANDARDS §2 the floor moves with the current stable; the Phase 1
  # planning floor of 1.23 was lifted at Phase 1.5 kickoff to track this.
  GO_VERSION: "1.25.x"
  # Node + pnpm versions for the web/ workspace. Floor-tracked: pnpm 10
  # is the lockfile generator on disk and the workspace package.json
  # `engines` block requires pnpm >= 9. Node 20 LTS is the floor; vite 6
  # supports Node 18+, but 20 is what package.json declares.
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "gofmt needs to be run on:"; echo "$diff"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@fe1dd0c3658873b46f8c9bb3291096a617310ca6 # v1.3.1
        with:
          version: latest
          install-go: false
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...

  web:
    name: web (build + check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: pnpm install (workspace)
        run: pnpm --dir web install --frozen-lockfile
      - name: build (suite SPA)
        run: pnpm --dir web run build
      - name: check (svelte-check etc)
        run: pnpm --dir web run check
      # `test` and `lint` are no-ops today (no package defines them);
      # `pnpm --recursive --if-present` keeps that future-proof.
      - name: test
        run: pnpm --dir web run test
      - name: lint
        run: pnpm --dir web run lint

  test:
    name: test (${{ matrix.arch }} / ${{ matrix.store }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        store: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: herold
          POSTGRES_PASSWORD: herold
          POSTGRES_DB: herold
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HEROLD_TEST_STORE: ${{ matrix.store }}
      # HEROLD_PG_DSN is read by internal/storepg/storepg_test.go and the
      # test/e2e fixtures. Aligning on this single name keeps the
      # Postgres parity legs (storepg compliance + cross-backend e2e)
      # actually exercised in CI per STANDARDS §1.8 / §8.4.
      HEROLD_PG_DSN: postgres://herold:herold@localhost:5432/herold?sslmode=disable
      GOARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Cross-arch builds run under emulation only for build/vet; tests run
      # native on amd64. We still build on arm64 to catch portability issues
      # early (per docs/design/server/implementation/03-testing-strategy.md §CI matrix).
      # Build with the default tag (which embeds the SPA placeholders
      # via go:embed) and then a second pass with -tags nofrontend so
      # the build-tag split (internal/webspa/embed_default.go vs
      # embed_stub.go) cannot regress without CI catching it.
      - name: build (embedded)
        run: go build -trimpath ./...
      - name: build (nofrontend)
        run: go build -trimpath -tags nofrontend ./...
      - name: wait for postgres
        if: matrix.arch == 'amd64' && matrix.store == 'postgres'
        run: |
          # Poll until the service container is ready to accept
          # connections. The service options block already runs
          # pg_isready inside the container; this guard ensures the
          # host-side test process does not race the bring-up.
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U herold >/dev/null 2>&1; then
              echo "postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgres not ready after 30s" >&2
          exit 1
      - name: test
        if: matrix.arch == 'amd64'
        run: go test -race -count=1 ./...

  fuzz-short:
    name: fuzz (short)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: run short fuzz on every fuzz target touched in this PR
        # 32 fuzz targets must finish inside the 15-minute job timeout.
        # 5s/target leaves headroom for per-target Go-compile overhead.
        run: make fuzz-short FUZZTIME=5s

  conformance:
    name: conformance (imaptest + scripted-smtp + pigeonhole + mail-auth vectors)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Wiring for these suites is conformance-fuzz-engineer's surface.
      # Phase 0 lands the workflow; the test/interop tree is currently a
      # Python/Docker harness with no Go packages, so `go test ./test/interop/...`
      # exits with "no packages to test" (1). Treat the missing-Go-package
      # state as pass; once Phase 1 wires in imaptest / Postfix-Exim /
      # Pigeonhole / mail-auth vectors, drop the guard and let `go test`
      # run the suite directly.
      - name: run conformance
        run: |
          if find test/interop -name '*.go' | head -1 | grep -q .; then
            go test -count=1 ./test/interop/...
          else
            echo "test/interop has no Go packages yet (Phase 0 placeholder); skipping."
          fi
