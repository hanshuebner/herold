name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      # Build the Suite SPA once and reuse the artefacts across the
      # GOOS/GOARCH cross-builds. The dist tree is byte-identical
      # regardless of target platform; only the Go binary is platform-
      # specific.
      - name: build-web
        run: ./scripts/build-web.sh
      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -trimpath -buildvcs=true -ldflags "-s -w" \
            -o dist/herold-${{ matrix.os }}-${{ matrix.arch }} ./cmd/herold
          for p in plugins/herold-*; do
            name=$(basename "$p")
            go build -trimpath -buildvcs=true -ldflags "-s -w" \
              -o dist/${name}-${{ matrix.os }}-${{ matrix.arch }} ./$p
          done
      - name: sbom
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.17.8
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/sbom-${{ matrix.os }}-${{ matrix.arch }}.cdx.json
      - name: cosign sign
        uses: sigstore/cosign-installer@4959ce089c160fddf62f7b42464195ba1a56d382 # v3.6.0
      - name: sign artefacts
        run: |
          for f in dist/*; do
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" "$f"
          done
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: herold-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
